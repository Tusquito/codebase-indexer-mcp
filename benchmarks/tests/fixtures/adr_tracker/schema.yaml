version: 1

enums:
  tracker_status:
    - not_started
    - candidate
    - planned
    - in_progress
    - implemented
    - verified
    - merged
    - deferred
  event:
    - prioritization
    - plan
    - implementation
    - verification
    - merge
    - defer
  git_status:
    - pending
    - merged

phase_file:
  required:
    - adr_id
    - phase_key
    - title
    - tracker_status
    - chosen_scope
    - last_updated
  optional:
    - pr_url
    - adr_status_note

event_file:
  required:
    - adr_id
    - phase_key
    - event
    - date
    - tracker_status
    - choices
    - deviations
    - changelog
    - user_facing
  optional:
    - phase_title
    - code_evidence
    - test_debt
    - verify
    - git
    - open_decisions

changelog:
  required:
    - update
  optional:
    - bullet
    - reason

git:
  optional:
    - pr_url
    - commit
    - status
