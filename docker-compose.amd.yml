# AMD GPU override for mcp_server (native Linux). Use with the base compose file:
#   EMBED_DEVICE=rocm docker compose -f docker-compose.yml -f docker-compose.amd.yml up --build
#
# Requires an AMD GPU with ROCm support (RDNA3/RDNA4 discrete Radeon or Ryzen AI Max /
# Strix Halo). DirectML is not used — the server runs in a Linux container with
# onnxruntime-rocm (MIGraphX + ROCm execution providers).
services:
  mcp_server:
    build:
      args:
        EMBED_DEVICE: rocm
        ROCM_VARIANT: native
    environment:
      EMBED_DEVICE: rocm
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    security_opt:
      - seccomp:unconfined
    ipc: host
