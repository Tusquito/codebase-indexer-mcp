services:
  qdrant:
    # Pin a specific version for reproducible builds and supply-chain safety.
    # Bump deliberately after testing; avoid :latest which silently drifts.
    image: qdrant/qdrant:v1.18.1
    container_name: codeindexer_qdrant
    restart: unless-stopped
    # Bind to loopback only — Qdrant has no auth here and should never be
    # reachable from the LAN. Use 127.0.0.1 so only the local host can connect.
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    # Resource caps keep one service from starving the other or tripping the
    # Docker VM OOM killer. Override per-machine via .env (see .env.example).
    deploy:
      resources:
        limits:
          memory: ${QDRANT_MEM_LIMIT:?Set QDRANT_MEM_LIMIT in .env}
          cpus: "${QDRANT_CPUS:?Set QDRANT_CPUS in .env}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp_server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: codeindexer_mcp
    restart: unless-stopped
    # Bind to loopback only so the MCP server is not exposed to the LAN. For
    # remote access, set MCP_AUTH_TOKEN and publish on the desired interface.
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      QDRANT_URL: http://qdrant:6333
      DENSE_EMBED_MODEL: ${DENSE_EMBED_MODEL:?Set DENSE_EMBED_MODEL in .env}
      SPARSE_EMBED_MODEL: ${SPARSE_EMBED_MODEL:?Set SPARSE_EMBED_MODEL in .env}
      DENSE_EMBED_VECTOR_SIZE: ${DENSE_EMBED_VECTOR_SIZE:?Set DENSE_EMBED_VECTOR_SIZE in .env}
      QDRANT_COLLECTION: codebase
      HYBRID_SEARCH: true
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      # Optional bearer token. When set, all HTTP requests (except /health)
      # must send `Authorization: Bearer <token>`. The in-container stdio proxy
      # reads the same value, so stdio sessions keep working.
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      MAX_CHUNK_LINES: 150
      CHUNK_OVERLAP_LINES: 20
      BATCH_SIZE: ${BATCH_SIZE:-32}
      LOG_LEVEL: INFO
      # ONNX / BLAS thread caps. Keep at/below physical cores; dense + sparse
      # encoders run concurrently, so this is per-encoder. ~12 leaves headroom
      # on a 16-core box for Qdrant indexing and the asyncio loop.
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:?Set OMP_NUM_THREADS in .env}
      OPENBLAS_NUM_THREADS: ${OMP_NUM_THREADS}
      MKL_NUM_THREADS: ${OMP_NUM_THREADS}
      # glibc tuning: cap per-thread malloc arenas (default is 8*cores) and
      # trim aggressively so native allocations are returned to the OS instead
      # of bloating RSS. Big RAM win under threaded ONNX with zero speed cost.
      MALLOC_ARENA_MAX: ${MALLOC_ARENA_MAX:-2}
      MALLOC_TRIM_THRESHOLD_: ${MALLOC_TRIM_THRESHOLD_:-131072}
      # Pipeline tuning knobs (see config.py / .env.example).
      FLUSH_EVERY: ${FLUSH_EVERY:-1500}
      UPSERT_BATCH: ${UPSERT_BATCH:-500}
      READAHEAD_BUFFER: ${READAHEAD_BUFFER:-100}
      MAX_DENSE_EMBED_TOKENS: ${MAX_DENSE_EMBED_TOKENS:-0}
      MAX_SPARSE_EMBED_TOKENS: ${MAX_SPARSE_EMBED_TOKENS:-0}
      DENSE_THREADS: ${DENSE_THREADS:-0}
      SPARSE_THREADS: ${SPARSE_THREADS:?Set SPARSE_THREADS in .env}
      # Memory pressure thresholds — adaptive OOM prevention.
      MEMORY_PRESSURE_WARN_PCT: ${MEMORY_PRESSURE_WARN_PCT:-70}
      MEMORY_PRESSURE_HALT_PCT: ${MEMORY_PRESSURE_HALT_PCT:-85}
      # Qdrant storage tuning (RAM vs search speed).
      VECTORS_ON_DISK: ${VECTORS_ON_DISK:-true}
      SPARSE_ON_DISK: ${SPARSE_ON_DISK:-true}
      QUANTIZATION: ${QUANTIZATION:-true}
      MEMMAP_THRESHOLD_KB: ${MEMMAP_THRESHOLD_KB:-20000}
      FASTEMBED_CACHE_PATH: /cache/fastembed
      # Default 0 so first run can download models into fastembed_cache volume.
      # Set HF_HUB_OFFLINE=1 in .env after models are cached for air-gapped use.
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
    deploy:
      resources:
        limits:
          memory: ${MCP_MEM_LIMIT:?Set MCP_MEM_LIMIT in .env}
          cpus: "${MCP_CPUS:?Set MCP_CPUS in .env}"
    volumes:
      - ${WORKSPACE_ROOT:?Set WORKSPACE_ROOT in .env to your repos directory}:/workspace:ro
      - fastembed_cache:/cache/fastembed
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

volumes:
  qdrant_data:
  fastembed_cache:

networks:
  default:
    name: codeindexer
