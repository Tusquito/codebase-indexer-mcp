services:
  qdrant:
    # Pin a specific version for reproducible builds and supply-chain safety.
    # Bump deliberately after testing; avoid :latest which silently drifts.
    image: qdrant/qdrant:v1.18.2
    container_name: codeindexer_qdrant
    restart: unless-stopped
    # Bind to loopback only — Qdrant has no auth here and should never be
    # reachable from the LAN. Use 127.0.0.1 so only the local host can connect.
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    # Resource caps keep one service from starving the other or tripping the
    # Docker VM OOM killer. Override per-machine via .env (see .env.example).
    deploy:
      resources:
        limits:
          memory: ${QDRANT_MEM_LIMIT:?Set QDRANT_MEM_LIMIT in .env}
          cpus: "${QDRANT_CPUS:?Set QDRANT_CPUS in .env}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp_server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: codeindexer_mcp
    restart: unless-stopped
    # Bind to loopback only so the MCP server is not exposed to the LAN. For
    # remote access, set MCP_AUTH_TOKEN and publish on the desired interface.
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      # --- Qdrant client ---
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-30}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-codebase}
      HYBRID_SEARCH: ${HYBRID_SEARCH:-true}
      # --- Embedding models (full re-index when dense model/dim changes) ---
      DENSE_EMBED_MODEL: ${DENSE_EMBED_MODEL:?Set DENSE_EMBED_MODEL in .env}
      SPARSE_EMBED_MODEL: ${SPARSE_EMBED_MODEL:?Set SPARSE_EMBED_MODEL in .env}
      DENSE_EMBED_VECTOR_SIZE: ${DENSE_EMBED_VECTOR_SIZE:?Set DENSE_EMBED_VECTOR_SIZE in .env}
      SPARSE_THREADS: ${SPARSE_THREADS:?Set SPARSE_THREADS in .env}
      # --- Ollama dense (see docker-compose.ollama.yml for bundled service) ---
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-}
      OLLAMA_EMBED_BATCH_SIZE: ${OLLAMA_EMBED_BATCH_SIZE:-32}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-120}
      # --- MCP HTTP transport ---
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8000}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      WORKSPACE_PATH: ${WORKSPACE_PATH:-/workspace}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # --- Chunking / scan ---
      MAX_CHUNK_LINES: ${MAX_CHUNK_LINES:-150}
      CHUNK_OVERLAP_LINES: ${CHUNK_OVERLAP_LINES:-20}
      EXCLUDED_DIRS: ${EXCLUDED_DIRS:-node_modules,.git,__pycache__,.venv,venv,dist,build,target,bin,obj,.gradle,.mypy_cache,.pytest_cache,.ruff_cache,.github,.idea,.vscode,migrations}
      # --- Pipeline batching ---
      BATCH_SIZE: ${BATCH_SIZE:-32}
      FLUSH_EVERY: ${FLUSH_EVERY:-1500}
      UPSERT_BATCH: ${UPSERT_BATCH:-500}
      READAHEAD_BUFFER: ${READAHEAD_BUFFER:-100}
      MAX_DENSE_EMBED_TOKENS: ${MAX_DENSE_EMBED_TOKENS:-0}
      MAX_SPARSE_EMBED_TOKENS: ${MAX_SPARSE_EMBED_TOKENS:-0}
      SEQUENTIAL_EMBED: ${SEQUENTIAL_EMBED:-false}
      # --- Sparse BM25 lifecycle ---
      RELEASE_MODELS_AFTER_INDEX: ${RELEASE_MODELS_AFTER_INDEX:-true}
      MODEL_IDLE_TIMEOUT: ${MODEL_IDLE_TIMEOUT:-300}
      PRELOAD_MODELS: ${PRELOAD_MODELS:-true}
      # --- Memory pressure (cgroup-aware) ---
      MEMORY_PRESSURE_WARN_PCT: ${MEMORY_PRESSURE_WARN_PCT:-70}
      MEMORY_PRESSURE_HALT_PCT: ${MEMORY_PRESSURE_HALT_PCT:-85}
      # --- Qdrant storage (re-index to apply collection schema changes) ---
      VECTORS_ON_DISK: ${VECTORS_ON_DISK:-true}
      SPARSE_ON_DISK: ${SPARSE_ON_DISK:-true}
      QUANTIZATION: ${QUANTIZATION:-true}
      MEMMAP_THRESHOLD_KB: ${MEMMAP_THRESHOLD_KB:-20000}
      PAYLOAD_INDEXES: ${PAYLOAD_INDEXES:-true}
      # --- Qdrant search / HNSW (query-time; immediate effect) ---
      QUANT_OVERSAMPLING: ${QUANT_OVERSAMPLING:-2.0}
      HNSW_EF: ${HNSW_EF:-64}
      HNSW_M: ${HNSW_M:-16}
      HNSW_EF_CONSTRUCT: ${HNSW_EF_CONSTRUCT:-128}
      PREFETCH_MULTIPLIER: ${PREFETCH_MULTIPLIER:-5}
      RRF_K: ${RRF_K:-60}
      # --- Optional ColBERT reranking (requires re-index when enabling) ---
      RERANK_ENABLED: ${RERANK_ENABLED:-false}
      COLBERT_EMBED_MODEL: ${COLBERT_EMBED_MODEL:-colbert-ir/colbertv2.0}
      RERANK_PREFETCH: ${RERANK_PREFETCH:-100}
      RERANK_MAX_QUERY_TOKENS: ${RERANK_MAX_QUERY_TOKENS:-0}
      COLBERT_EMBED_BACKEND: ${COLBERT_EMBED_BACKEND:-onnx}
      COLBERT_URL: ${COLBERT_URL:-http://colbert_worker:8082}
      COLBERT_TIMEOUT: ${COLBERT_TIMEOUT:-300}
      COLBERT_EMBED_BATCH_SIZE: ${COLBERT_EMBED_BATCH_SIZE:-16}
      # --- Recommendation search (ADR 0014; dense-only) ---
      RECOMMEND_ENABLED: ${RECOMMEND_ENABLED:-true}
      RECOMMEND_MAX_EXAMPLES: ${RECOMMEND_MAX_EXAMPLES:-10}
      # --- Service mapping / cross-references ---
      SERVICE_URL_KEYWORDS: ${SERVICE_URL_KEYWORDS:-rest,api,profile,service,internal,public,gateway,graphql,webhook,auth,users,accounts}
      SERVICE_DISCOVERY_EXTRA_QUERIES: ${SERVICE_DISCOVERY_EXTRA_QUERIES:-}
      # --- CPU / BLAS / glibc (sparse ONNX) ---
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:?Set OMP_NUM_THREADS in .env}
      OPENBLAS_NUM_THREADS: ${OMP_NUM_THREADS}
      MKL_NUM_THREADS: ${OMP_NUM_THREADS}
      MALLOC_ARENA_MAX: ${MALLOC_ARENA_MAX:-2}
      MALLOC_TRIM_THRESHOLD_: ${MALLOC_TRIM_THRESHOLD_:-131072}
      # --- Caches (container paths) ---
      FASTEMBED_CACHE_PATH: /cache/fastembed
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
    deploy:
      resources:
        limits:
          memory: ${MCP_MEM_LIMIT:?Set MCP_MEM_LIMIT in .env}
          cpus: "${MCP_CPUS:?Set MCP_CPUS in .env}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${WORKSPACE_ROOT:?Set WORKSPACE_ROOT in .env to your repos directory}:/workspace:ro
      - fastembed_cache:/cache/fastembed
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # FALLBACK: stdio sidecar proxy (DISABLED — uncomment to use)
  #
  # Use when Cursor cannot reach the HTTP endpoint directly and you need the
  # old docker-exec stdio bridge. This container is independent of mcp_server
  # restarts (no depends_on), so the exec session survives mcp_server recycle.
  #
  # Matching ~/.cursor/mcp.json entry:
  #   "codebase-indexer": {
  #     "type": "stdio",
  #     "command": "docker",
  #     "args": ["exec", "-i", "codeindexer_proxy", "python", "/app/stdio_proxy.py"]
  #   }
  #
  # proxy:
  #   image: python:3.12-slim
  #   container_name: codeindexer_proxy
  #   restart: unless-stopped
  #   command: sleep infinity
  #   environment:
  #     MCP_URL: http://mcp_server:8000/mcp
  #     MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
  #   volumes:
  #     - ./mcp_server/src/codebase_indexer/stdio_proxy.py:/app/stdio_proxy.py:ro

  cron:
    build:
      context: ./cron
      dockerfile: Dockerfile
    container_name: codeindexer_cron
    restart: unless-stopped
    depends_on:
      mcp_server:
        condition: service_healthy
    environment:
      TZ: Europe/Amsterdam
      MCP_URL: ${MCP_URL:-http://mcp_server:8000}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      WORKSPACE_ROOT: /workspace
      INDEX_TIMEOUT: ${INDEX_TIMEOUT:-1800}
      MCP_HTTP_TIMEOUT: ${MCP_HTTP_TIMEOUT:-300}
      GIT_TIMEOUT: ${GIT_TIMEOUT:-120}
    volumes:
      - ${WORKSPACE_ROOT:?Set WORKSPACE_ROOT in .env to your repos directory}:/workspace
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "1"

volumes:
  qdrant_data:
  fastembed_cache:

networks:
  default:
    name: codeindexer
