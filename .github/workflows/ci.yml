name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  dotnet-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore and test .NET solution (ADR 0030)
        run: dotnet test CodebaseIndexer.slnx

  python-devtools:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: benchmarks
    env:
      ACCELERATOR: cpu
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra benchmark

      - name: Run benchmarks unit tests
        run: uv run pytest -q

      - name: Validate ADR tracker render (blocking, ADR 0019 Phase 2)
        working-directory: .
        run: python scripts/render_adr_tracker.py --check

  aspire-integration:
    # Non-blocking in GH CI (long TEI pull); mandatory locally via adr-integration-tester.
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 45
    env:
      ACCELERATOR: cpu
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up Python
        run: uv python install 3.12

      - name: Install benchmark tooling
        working-directory: benchmarks
        run: uv sync --extra dev --extra benchmark

      - name: Run aspire-stack integration smoke
        run: >-
          python scripts/run_compose_integration.py --json
          --quality-validation --quality-threshold 0

  eval-retrieval:
    # Non-blocking: validates golden-set label schema when Qdrant is available.
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: benchmarks
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      QDRANT_URL: http://localhost:6333
      ACCELERATOR: cpu
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra benchmark

      - name: Validate golden-set labels (skip search when collection missing)
        run: uv run python -m benchmarks.eval_retrieval --validate-labels || true

  gpu-smoke:
    # Non-blocking: real GPU Aspire stack on self-hosted runner (ADR 0022 Phase 3).
    runs-on: [self-hosted, gpu]
    continue-on-error: true
    timeout-minutes: 45
    env:
      ACCELERATOR: gpu
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Set up Python
        run: uv python install 3.12

      - name: Install benchmark tooling
        working-directory: benchmarks
        run: uv sync --extra dev --extra benchmark

      - name: Run Aspire integration (GPU stack)
        run: python scripts/run_compose_integration.py --json
