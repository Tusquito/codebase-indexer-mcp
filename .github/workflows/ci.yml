name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp_server
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.1
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      QDRANT_URL: http://localhost:6333
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy, non-blocking)
        run: uv run mypy src || true

      - name: Run tests
        run: uv run pytest -q

  benchmark:
    # Non-blocking: surfaces performance numbers as an artifact without gating
    # merges on runner-dependent latency. Strict thresholds stay off in CI.
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: mcp_server
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.1
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      QDRANT_URL: http://localhost:6333
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run benchmark (payload indexes ON) vs committed baseline
        run: >-
          uv run python -m benchmarks.bench
          --files 150 --iterations 20
          --compare benchmarks/baseline.json
          --output bench-results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: mcp_server/bench-results.json

  docker-image:
    # Non-blocking: validates CPU/CUDA/ROCm Dockerfile matrix without gating merges.
    # GPU images are large; build-only (GitHub runners have no NVIDIA/AMD GPU).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build CPU image
        run: docker build --build-arg EMBED_DEVICE=cpu -t codebase-indexer:cpu ./mcp_server

      - name: Build CUDA image
        run: docker build --build-arg EMBED_DEVICE=cuda -t codebase-indexer:cuda ./mcp_server

      - name: Build ROCm image (native Linux)
        run: docker build --build-arg EMBED_DEVICE=rocm --build-arg ROCM_VARIANT=native -t codebase-indexer:rocm ./mcp_server

      # WSL2 variant: ROCm 7.2.1 + onnxruntime_migraphx; build-only (no /dev/dxg on CI).
      - name: Build ROCm image (WSL2)
        run: docker build --build-arg EMBED_DEVICE=rocm --build-arg ROCM_VARIANT=wsl -t codebase-indexer:rocm-wsl ./mcp_server

      - name: Smoke test CUDA image (provider + package swap)
        run: >-
          docker run --rm codebase-indexer:cuda
          /app/.venv/bin/python -c
          "import onnxruntime as ort; assert 'CUDAExecutionProvider' in ort.get_available_providers(), ort.get_available_providers(); import fastembed_gpu; from fastembed.sparse import SparseTextEmbedding; print(ort.__version__)"
