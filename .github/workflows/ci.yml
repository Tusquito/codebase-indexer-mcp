name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp_server
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      QDRANT_URL: http://localhost:6333
      ACCELERATOR: cpu
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy, non-blocking)
        run: uv run mypy src || true

      - name: Run tests
        run: uv run pytest -q

  benchmark:
    # Non-blocking: surfaces performance numbers as an artifact without gating
    # merges on runner-dependent latency. Strict thresholds stay off in CI.
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: mcp_server
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      QDRANT_URL: http://localhost:6333
      ACCELERATOR: cpu
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run benchmark (payload indexes ON) vs committed baseline
        run: >-
          uv run python -m benchmarks.bench
          --files 150 --iterations 20
          --compare benchmarks/baseline.json
          --output bench-results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: mcp_server/bench-results.json
          if-no-files-found: ignore

  eval-retrieval:
    # Non-blocking: validates golden-set label schema and runs eval when
    # Qdrant + Ollama + indexed collection are available on the runner.
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: mcp_server
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c ':> /dev/tcp/127.0.0.1/6333'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      QDRANT_URL: http://localhost:6333
      ACCELERATOR: cpu
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra benchmark

      - name: Validate golden-set labels (skip search when collection missing)
        run: uv run python -m benchmarks.eval_retrieval --validate-labels || true

      - name: Run retrieval eval vs baseline (skip when Ollama/index unavailable)
        run: >-
          uv run python -m benchmarks.eval_retrieval
          --compare benchmarks/fixtures/eval_baseline.json
          --output eval-results.json
          || true

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-retrieval-results
          path: mcp_server/eval-results.json
        if: always()

  docker-image:
    # Non-blocking: validates the MCP Docker image builds successfully.
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      ACCELERATOR: cpu
    steps:
      - uses: actions/checkout@v4

      - name: Build MCP image
        run: docker build -t codebase-indexer ./mcp_server

  colbert-gpu-image:
    # Non-blocking: validates the GPU ColBERT sidecar Dockerfile builds.
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      ACCELERATOR: cpu
    steps:
      - uses: actions/checkout@v4

      - name: Build ColBERT GPU sidecar image
        run: docker build -f colbert_worker/Dockerfile.gpu -t colbert-worker-gpu ./mcp_server

  compose-integration:
    # Blocking: full Docker Compose stack on CPU (ADR 0022 — sole CI CPU exception).
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ACCELERATOR: cpu
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: mcp_server
        run: uv sync --extra dev

      - name: Run compose integration (CPU stack)
        run: python scripts/run_compose_integration.py --json

  gpu-smoke:
    # Non-blocking: real GPU stack smoke on self-hosted runner (ADR 0022 Phase 3).
    runs-on: [self-hosted, gpu]
    continue-on-error: true
    timeout-minutes: 45
    env:
      ACCELERATOR: gpu
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: mcp_server
        run: uv sync --extra dev

      - name: Run compose integration (GPU stack)
        run: python scripts/run_compose_integration.py --json
