# AMD GPU override for mcp_server on Windows + WSL2. Use with the base compose file:
#   EMBED_DEVICE=rocm docker compose -f docker-compose.yml -f docker-compose.amd.wsl2.yml up --build
#
# Builds ROCm 7.2.1 + onnxruntime_migraphx (ROCM_VARIANT=wsl). onnxruntime 1.23 has no
# ROCMExecutionProvider — dense embedding uses MIGraphXExecutionProvider over /dev/dxg;
# falls back to CPU if that EP is unavailable.
#
# WSL2 prerequisites: Adrenalin driver 26.2.2+, ROCm 7.2.1+ on the Windows host,
# and /dev/dxg present in WSL2.
#
# librocdxg.so is NOT shipped by apt — build from github.com/ROCm/librocdxg (develop
# branch) on the WSL host and install with `sudo make install` → /opt/rocm/lib/librocdxg.so.
# Without it the container falls back to CPU. AMD does NOT currently support
# MIGraphX/mGPU on WSL2, so CPU fallback is expected — for real AMD GPU acceleration
# use native Linux with docker-compose.amd.yml.
#
# /dev/kfd does NOT work in WSL2 — use this override instead of docker-compose.amd.yml.
services:
  mcp_server:
    build:
      args:
        EMBED_DEVICE: rocm
        ROCM_VARIANT: wsl
    environment:
      EMBED_DEVICE: rocm
      HSA_ENABLE_DXG_DETECTION: "1"
    # environment:
    #   HSA_OVERRIDE_GFX_VERSION: "11.5.1"  # only for gfx1151 Strix Halo / unsupported-but-similar archs
    devices:
      - /dev/dxg
    volumes:
      - /usr/lib/wsl/lib/libdxcore.so:/usr/lib/libdxcore.so:ro
      # OPT-IN: uncomment ONLY after building+installing librocdxg on the WSL host
      # (github.com/ROCm/librocdxg, develop branch → sudo make install).
      # A bind-mount of a missing file creates a broken empty directory and breaks compose.
      # - /opt/rocm/lib/librocdxg.so:/usr/lib/librocdxg.so:ro
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    ipc: host
    shm_size: "8gb"
