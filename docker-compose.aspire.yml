# Generated from CodebaseIndexer.AppHost (ADR 0030 Phase 2).
# arm64 CPU profile — TEI cpu-arm64-latest, accelerator=cpu.
# fastembed sparse cache at /root/.cache/fastembed (fastembed_cache volume).

services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: codeindexer_qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-arm64-latest
    container_name: codeindexer_tei
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - tei_data:/data
    environment:
      MODEL_ID: ${DENSE_EMBED_MODEL:-jinaai/jina-embeddings-v2-base-code}
      HF_TOKEN: ${HF_TOKEN:-}
    command: --model-id ${DENSE_EMBED_MODEL:-jinaai/jina-embeddings-v2-base-code} --port 80 --max-batch-tokens 1024
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 24
      start_period: 480s

  mcp:
    build:
      context: .
      dockerfile: src/CodebaseIndexer.Host/Dockerfile
    container_name: codeindexer_mcp_dotnet
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      tei:
        condition: service_healthy
    volumes:
      - ${WORKSPACE_PATH:-.}:/workspace:ro
      - fastembed_cache:/root/.cache/fastembed
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://0.0.0.0:8000
      Qdrant__Url: http://qdrant:6333
      Tei__Url: http://tei:80
      Workspace__Path: /workspace
      Embedding__CachePath: /root/.cache/fastembed
      Embedding__DenseModel: ${DENSE_EMBED_MODEL:-jinaai/jina-embeddings-v2-base-code}
      Embedding__DenseVectorSize: ${DENSE_EMBED_VECTOR_SIZE:-768}
      Embedding__SparseModel: ${SPARSE_EMBED_MODEL:-Qdrant/bm25}
      Embedding__HybridSearch: ${HYBRID_SEARCH:-true}
      Workspace__HashWorkerDop: "1"
      Indexing__PreloadModels: ${PRELOAD_MODELS:-true}

volumes:
  qdrant_data:
  tei_data:
  fastembed_cache:
