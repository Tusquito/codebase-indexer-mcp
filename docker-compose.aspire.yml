# Production default Aspire/.NET stack (ADR 0030 Phase 7).
# Generated from CodebaseIndexer.AppHost (ADR 0030 Phase 6).
# CPU Aspire stack — TEI image via TEI_IMAGE (arch-aware; see scripts/accelerator.py
# tei_image_default / ADR 0028). Default is amd64 cpu-1.9; arm64 hosts/harness set
# cpu-arm64-latest. fastembed sparse + ColBERT cache at /root/.cache/fastembed.
# ColBERT worker is always present; enable via Embedding__RerankEnabled=true
# (defaults remote Colbert__EmbedBackend). GPU: merge docker-compose.aspire.colbert.gpu.yml
# when ACCELERATOR=gpu. Neo4j is off by default — merge docker-compose.aspire.neo4j.yml
# for GraphRAG (ADR 0030 Phase 5).
#
# Canonical compose args: python scripts/aspire_compose.py
# Re-index after pull (index_all(force=true)); no schema-version env.

services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: codeindexer_qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  tei:
    image: ${TEI_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:cpu-1.9}
    container_name: codeindexer_tei
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - tei_data:/data
    environment:
      MODEL_ID: ${DENSE_EMBED_MODEL:-jinaai/jina-embeddings-v2-base-code}
      HF_TOKEN: ${HF_TOKEN:-}
    command: --model-id ${DENSE_EMBED_MODEL:-jinaai/jina-embeddings-v2-base-code} --port 80 --max-batch-tokens ${TEI_MAX_BATCH_TOKENS:-1024}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 24
      start_period: 480s

  colbert:
    build:
      context: .
      dockerfile: src/CodebaseIndexer.ColbertWorker/Dockerfile
    container_name: codeindexer_colbert
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8082"
    volumes:
      - ${ASPIRE_FASTEMBED_CACHE:-fastembed_cache}:/root/.cache/fastembed
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8082
      Embedding__CachePath: /root/.cache/fastembed
      Embedding__ColbertEmbedModel: ${COLBERT_EMBED_MODEL:-colbert-ir/colbertv2.0}
      Colbert__EmbedModel: ${COLBERT_EMBED_MODEL:-colbert-ir/colbertv2.0}
      Colbert__EmbedBackend: onnx
      Colbert__UseCuda: "false"
      Colbert__EmbedBatchSize: ${COLBERT_EMBED_BATCH_SIZE:-16}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 180s

  mcp:
    build:
      context: .
      dockerfile: src/CodebaseIndexer.Host/Dockerfile
    container_name: codeindexer_mcp_dotnet
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
      tei:
        condition: service_healthy
      colbert:
        condition: service_healthy
    volumes:
      - ${WORKSPACE_PATH:-.}:/workspace:ro
      # Default named volume; integration harness sets ASPIRE_FASTEMBED_CACHE to a
      # host path seeded with Qdrant/bm25 (OnnxSparseEmbedder does not download).
      - ${ASPIRE_FASTEMBED_CACHE:-fastembed_cache}:/root/.cache/fastembed
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://0.0.0.0:8000
      Qdrant__Url: http://qdrant:6334
      Qdrant__TimeoutSeconds: ${QDRANT_TIMEOUT:-120}
      Tei__Url: http://tei:80
      Tei__TimeoutSeconds: ${TEI_TIMEOUT:-600}
      Tei__EmbedBatchSize: ${TEI_EMBED_BATCH_SIZE:-16}
      Workspace__Path: /workspace
      Embedding__CachePath: /root/.cache/fastembed
      Embedding__DenseModel: ${DENSE_EMBED_MODEL:-jinaai/jina-embeddings-v2-base-code}
      Embedding__DenseVectorSize: ${DENSE_EMBED_VECTOR_SIZE:-768}
      Embedding__SparseModel: ${SPARSE_EMBED_MODEL:-Qdrant/bm25}
      Embedding__HybridSearch: ${HYBRID_SEARCH:-true}
      Embedding__MaxDenseTokens: ${MAX_DENSE_EMBED_TOKENS:-1024}
      Embedding__RerankEnabled: ${RERANK_ENABLED:-false}
      Embedding__ColbertEmbedModel: ${COLBERT_EMBED_MODEL:-colbert-ir/colbertv2.0}
      Embedding__RerankPrefetch: ${RERANK_PREFETCH:-100}
      Embedding__RerankAdaptiveEnabled: ${RERANK_ADAPTIVE_ENABLED:-true}
      Embedding__RerankAdaptiveGap: ${RERANK_ADAPTIVE_GAP:-0.02}
      Colbert__EmbedBackend: ${COLBERT_EMBED_BACKEND:-remote}
      Colbert__Url: http://colbert:8082
      Colbert__TimeoutSeconds: ${COLBERT_TIMEOUT:-300}
      Colbert__EmbedBatchSize: ${COLBERT_EMBED_BATCH_SIZE:-16}
      Colbert__EmbedModel: ${COLBERT_EMBED_MODEL:-colbert-ir/colbertv2.0}
      Reindex__Enabled: ${REINDEX_ENABLED:-true}
      Reindex__Cron: ${REINDEX_CRON:-0 3 * * *}
      Reindex__GitPull: ${REINDEX_GIT_PULL:-true}
      Workspace__HashWorkerDop: "1"
      Indexing__PreloadModels: ${PRELOAD_MODELS:-true}
      Indexing__FlushEvery: ${FLUSH_EVERY:-128}
      Indexing__UpsertBatch: ${UPSERT_BATCH:-64}
      Indexing__BatchSize: ${INDEX_BATCH_SIZE:-16}
    # Readiness probe (ADR 0031): /health fails closed when TEI (and optional
    # remote ColBERT / Neo4j) is down. mcp depends_on tei healthy first, so
    # start_period covers MCP cold start only — not TEI model download.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

volumes:
  qdrant_data:
  tei_data:
  fastembed_cache:
