# GPU override for bundled Ollama — part of the default stack when ACCELERATOR=gpu (ADR 0022).
# Requires NVIDIA driver + Container Toolkit. Set OLLAMA_GPU=1 in .env.
#
# Canonical invocation (do not hand-assemble -f lists):
#   docker compose $(python scripts/compose_files.py) --profile bundled-ollama up -d --build
#
# Verify processor after loading a model:
#   docker exec codeindexer_ollama ollama ps
#   # GPU: PROCESSOR shows GPU or CPU/GPU mix; CPU-only: 100% CPU

services:
  ollama:
    profiles: ["bundled-ollama"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OLLAMA_GPU_COUNT:-1}
              capabilities: [gpu]
