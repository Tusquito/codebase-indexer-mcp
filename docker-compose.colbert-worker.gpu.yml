# GPU override for ColBERT sidecar — default stack when ACCELERATOR=gpu + rerank on (ADR 0022).
# Requires NVIDIA driver + Container Toolkit. Merged automatically by compose_files.py.
#
# Canonical invocation (RERANK_ENABLED=true; remote sidecar is default):
#   docker compose $(python scripts/compose_files.py) --profile bundled-ollama up -d --build
#
# Explicit CPU-only: ACCELERATOR=cpu omits this file; sidecar uses colbert_worker/Dockerfile.
#
# Verify device after sidecar is healthy:
#   curl http://localhost:8082/health
#   # GPU: "device":"cuda", "cuda_available":true, execution_providers includes CUDAExecutionProvider

services:
  colbert_worker:
    build:
      dockerfile: ../colbert_worker/Dockerfile.gpu
    environment:
      COLBERT_USE_CUDA: "1"
      COLBERT_DEVICE_IDS: ${COLBERT_DEVICE_IDS:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${COLBERT_GPU_COUNT:-1}
              capabilities: [gpu]
