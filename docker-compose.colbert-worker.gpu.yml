# GPU override for ColBERT sidecar — part of default stack when ACCELERATOR=gpu + remote sidecar (ADR 0022).
# Requires NVIDIA driver + Container Toolkit. Set COLBERT_GPU=1 when sidecar is active.
#
# Canonical invocation (RERANK_ENABLED=true, COLBERT_EMBED_BACKEND=remote):
#   docker compose $(python scripts/compose_files.py) --profile bundled-ollama up -d --build
#
# Verify device after sidecar is healthy:
#   curl http://localhost:8082/health
#   # GPU: "device":"cuda", "cuda_available":true, execution_providers includes CUDAExecutionProvider

services:
  colbert_worker:
    build:
      dockerfile: ../colbert_worker/Dockerfile.gpu
    environment:
      COLBERT_USE_CUDA: "1"
      COLBERT_DEVICE_IDS: ${COLBERT_DEVICE_IDS:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${COLBERT_GPU_COUNT:-1}
              capabilities: [gpu]
