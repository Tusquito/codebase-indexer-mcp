# GPU override for bundled TEI — part of the default stack when ACCELERATOR=gpu (ADR 0022).
# Requires NVIDIA driver + Container Toolkit.
#
# Canonical invocation (do not hand-assemble -f lists):
#   docker compose $(python scripts/compose_files.py) --profile bundled-tei up -d --build
#
# Verify GPU after TEI loads the model:
#   docker exec codeindexer_tei nvidia-smi
#
# entrypoint override: upstream `cuda-entrypoint.sh` detects the host CUDA
# version by awk-parsing `nvidia-smi`'s human-readable header. NVIDIA driver
# 6xx renamed "CUDA Version:" to "CUDA UMD Version:", which breaks the parse
# and makes the script wrongly prepend the CUDA-compat shim to
# LD_LIBRARY_PATH, causing CUDA_ERROR_NO_DEVICE (silent CPU fallback) despite
# a working GPU. Bypassing the wrapper and launching the router directly
# avoids the broken detection entirely.
# https://github.com/huggingface/text-embeddings-inference/issues/870

services:
  tei:
    profiles: ["bundled-tei"]
    entrypoint: ["/usr/local/bin/text-embeddings-router"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${TEI_GPU_COUNT:-1}
              capabilities: [gpu]
