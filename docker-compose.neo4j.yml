# Optional: Neo4j graph storage for GraphRAG (ADR 0002 Phase 1).
#
# Usage:
#   Set in .env:
#     GRAPH_ENABLED=true
#     NEO4J_PASSWORD=your-secure-password
#     NEO4J_MEM_LIMIT=2g
#   docker compose -f docker-compose.yml -f docker-compose.neo4j.yml up -d --build
#
# Default deployment unchanged: omit this file; GRAPH_ENABLED=false.

services:
  neo4j:
    image: neo4j:5-community
    container_name: codeindexer_neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env when using Neo4j}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
    deploy:
      resources:
        limits:
          memory: ${NEO4J_MEM_LIMIT:-2g}
          cpus: "${NEO4J_CPUS:-2}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  mcp_server:
    environment:
      GRAPH_ENABLED: ${GRAPH_ENABLED:-true}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env when using Neo4j}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      GRAPH_WRITER_BATCH: ${GRAPH_WRITER_BATCH:-500}
      GRAPH_SCHEMA_VERSION: ${GRAPH_SCHEMA_VERSION:-1}
      GRAPH_MAX_HOPS: ${GRAPH_MAX_HOPS:-2}
      GRAPH_MAX_NODES: ${GRAPH_MAX_NODES:-200}
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
