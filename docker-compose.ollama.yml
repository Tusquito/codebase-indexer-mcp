# Optional: route dense embedding to Ollama (sparse BM25 stays in-process CPU in MCP).
#
# Usage (bundled Ollama — recommended; GPU override merged by default when ACCELERATOR=gpu):
#   Set in .env: COMPOSE_PROFILES=bundled-ollama, ACCELERATOR=gpu, OLLAMA_GPU=1
#   docker compose $(python scripts/compose_files.py) --profile bundled-ollama up -d --build
#   docker exec codeindexer_ollama ollama pull ${OLLAMA_EMBED_MODEL:-unclemusclez/jina-embeddings-v2-base-code}
#
# Explicit CPU-only (ACCELERATOR=cpu):
#   docker compose $(ACCELERATOR=cpu python scripts/compose_files.py) --profile bundled-ollama up -d --build
#
# External Ollama on the host (native or your own container on 127.0.0.1:11434):
#   Leave COMPOSE_PROFILES unset (or omit bundled-ollama)
#   OLLAMA_URL=http://host.docker.internal:11434
#   docker compose -f docker-compose.yml up -d --build

services:
  ollama:
    profiles: ["bundled-ollama"]
    image: ollama/ollama:0.31.1
    container_name: codeindexer_ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEM_LIMIT:-4g}
          cpus: "${OLLAMA_CPUS:-4}"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mcp_server:
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OLLAMA_EMBED_BATCH_SIZE: ${OLLAMA_EMBED_BATCH_SIZE:-32}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-120}
    depends_on:
      ollama:
        condition: service_healthy
        required: false

volumes:
  ollama_data:
