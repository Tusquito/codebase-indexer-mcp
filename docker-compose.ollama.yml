# Optional: route dense embedding to Ollama (sparse BM25 stays in-process ONNX).
#
# Usage (bundled Ollama in Compose — recommended):
#   Set in .env: COMPOSE_PROFILES=bundled-ollama
#   docker compose -f docker-compose.yml -f docker-compose.ollama.yml up -d --build
#   docker exec codeindexer_ollama ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
#
# GPU for bundled Ollama (NVIDIA Container Toolkit required):
#   Set in .env: OLLAMA_GPU=1
#   docker compose -f docker-compose.yml -f docker-compose.ollama.yml \
#     -f docker-compose.ollama.gpu.yml up -d --build
#
# External Ollama on the host (native or your own container on 127.0.0.1:11434):
#   Leave COMPOSE_PROFILES unset (or omit bundled-ollama)
#   OLLAMA_URL=http://host.docker.internal:11434
#   docker compose -f docker-compose.yml -f docker-compose.ollama.yml up -d --build

services:
  ollama:
    profiles: ["bundled-ollama"]
    image: ollama/ollama:0.31.1
    container_name: codeindexer_ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEM_LIMIT:-4g}
          cpus: "${OLLAMA_CPUS:-4}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mcp_server:
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OLLAMA_EMBED_BATCH_SIZE: ${OLLAMA_EMBED_BATCH_SIZE:-32}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-120}
    depends_on:
      ollama:
        condition: service_healthy
        required: false

volumes:
  ollama_data:
